<!-- ren2024 hero. Vault SVG style contract (palette + dark mode). -->
<svg width="100%" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Ren et al. 2024 — Emergence of Social Norms in Generative Agent Societies (CRSEC)</title>
<desc>LLM-driven agents on a small-world social network create, spread, evaluate and comply with personal norms; a few entrepreneurs seed a norm that propagates so the adoption rate rises toward 1 while social conflicts rise then fall.</desc>
<style>
  .t  { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; font-size: 14px; fill: #2C2C2A; }
  .ts { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; font-size: 13px; fill: #444441; }
  .tl { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; font-size: 12px; font-weight: 600; fill: #534AB7; letter-spacing: 2px; }
  .title { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; font-size: 28px; font-weight: 600; fill: #2C2C2A; }
  .glab { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; font-size: 11px; font-weight: 500; fill: #888780; letter-spacing: 0.5px; }
  .axis { stroke: #C7C5BD; stroke-width: 1; }
  .edge { stroke: #C7C5BD; stroke-width: 1; opacity: 0.7; }
  .adopt { stroke: #534AB7; stroke-width: 1.8; fill: none; }
  .conf  { stroke: #C0492B; stroke-width: 1.8; fill: none; opacity: 0.8; }
  .node { fill: #534AB7; }
  .nodeE { fill: #0F6E56; }
  .dot { fill: #534AB7; }
  @media (prefers-color-scheme: dark) {
    .t  { fill: #E5E5E2; }
    .ts { fill: #C7C5BD; }
    .tl { fill: #AFA9EC; }
    .title { fill: #E5E5E2; }
    .glab { fill: #8C8B85; }
    .axis { stroke: #5F5E5A; }
    .edge { stroke: #5F5E5A; }
    .adopt { stroke: #AFA9EC; }
    .conf  { stroke: #E08A72; }
    .node { fill: #AFA9EC; }
    .nodeE { fill: #5DCAA5; }
    .dot { fill: #AFA9EC; }
  }
</style>

<!-- left: label + title -->
<text x="40" y="60" class="tl">EMERGENCE OF SOCIAL NORMS</text>
<text x="40" y="96" class="title">Generative Agent</text>
<text x="40" y="128" class="title">Societies (CRSEC)</text>
<text x="40" y="162" class="ts">Ren et al. (2024)</text>
<text x="40" y="184" class="t">n = ⟨c, u, α, s_act, s_val⟩</text>
<text x="40" y="210" class="glab">create · spread · evaluate · comply</text>
<text x="40" y="234" class="glab">entrepreneurs seed a norm → shared norm emerges</text>

<!-- middle: small-world social network with a few entrepreneurs -->
<g transform="translate(470, 70)">
  <line x1="40" y1="20" x2="120" y2="10" class="edge"/>
  <line x1="40" y1="20" x2="20" y2="100" class="edge"/>
  <line x1="40" y1="20" x2="110" y2="90" class="edge"/>
  <line x1="120" y1="10" x2="110" y2="90" class="edge"/>
  <line x1="20" y1="100" x2="110" y2="90" class="edge"/>
  <circle cx="40" cy="20" r="7" class="nodeE"/>
  <circle cx="120" cy="10" r="7" class="node"/>
  <circle cx="20" cy="100" r="7" class="node"/>
  <circle cx="110" cy="90" r="7" class="node"/>
  <text x="65" y="150" class="glab" text-anchor="middle">small-world society</text>
</g>

<!-- right: emergence curves — adoption rises to 1, conflicts rise then fall -->
<g transform="translate(660, 40)">
  <line x1="0" y1="0" x2="0" y2="200" class="axis"/>
  <line x1="0" y1="200" x2="200" y2="200" class="axis"/>
  <text x="-8" y="6" class="glab" text-anchor="end">1.0</text>
  <text x="-8" y="204" class="glab" text-anchor="end">0</text>
  <text x="100" y="224" class="glab" text-anchor="middle">round t</text>

  <!-- adoption rate: monotone increase toward 1 -->
  <path class="adopt" d="M0 200 C 50 150, 90 40, 200 20"/>
  <circle cx="200" cy="20" r="4" class="dot"/>
  <!-- conflicts: rise then fall -->
  <path class="conf" d="M0 200 C 30 80, 60 60, 90 110 S 150 195, 200 198"/>
  <text x="120" y="40" class="glab">adoption →1</text>
  <text x="60" y="90" class="glab">conflicts ↑↓</text>
</g>
</svg>
